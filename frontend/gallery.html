<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery | AI Site Factory</title>
  <link rel="stylesheet" href="styles/globals.css">
  <style>
    .g-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.5rem;margin-top:1.5rem;}
    .gcard{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;display:flex;flex-direction:column;}
    .gprev{height:180px;background:#000;border-bottom:1px solid var(--border);position:relative;}
    .gprev iframe{width:400%;height:400%;transform:scale(.25);transform-origin:0 0;border:none;pointer-events:none;}
    .gprev-overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;pointer-events:none;}
    .gcard:hover .gprev-overlay{opacity:1;}
    .gprev-overlay a{pointer-events:auto;background:var(--accent);color:#fff;padding:.5rem 1rem;border-radius:20px;font-weight:700;font-size:.9rem;text-decoration:none;}
    .gbody{padding:1.1rem;flex:1;display:flex;flex-direction:column;}
    .gbadges{display:flex;gap:.5rem;margin-bottom:.6rem;flex-wrap:wrap;}
    .badge{padding:.2rem .6rem;border-radius:12px;font-size:.7rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;}
    .b-score{background:rgba(52,211,153,.1);color:var(--success);border:1px solid rgba(52,211,153,.3);}
    .b-score.low{background:rgba(248,112,112,.1);color:var(--error);border-color:rgba(248,112,112,.3);}
    
    .b-user{background:rgba(88,166,255,.1);color:var(--accent);border:1px solid rgba(88,166,255,.3);}
    .b-game{background:rgba(251,146,60,.1);color:#fb923c;border:1px solid rgba(251,146,60,.3);}
    .b-tool{background:rgba(52,211,153,.1);color:#34d399;border:1px solid rgba(52,211,153,.3);}
    .b-random{background:rgba(167,139,250,.1);color:#a78bfa;border:1px solid rgba(167,139,250,.3);}
    
    .gtitle{font-size:.95rem;font-weight:600;color:#fff;margin-bottom:.8rem;line-height:1.4;flex:1;}
    .gfoot{padding:.8rem 1.1rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
    .gfoot a{font-size:.82rem;color:var(--accent);font-weight:600;text-decoration:none;}
    .gfoot a:hover{text-decoration:underline;}
    .page-container { max-width: 1200px; margin: 3rem auto; padding: 0 1rem; }
    h1 { font-size: 2.2rem; color: #fff; font-weight: 900; margin-bottom: 0.5rem; }
    p.desc { color: var(--muted); margin-bottom: 2rem; font-size: 1.1rem; }
    
    .filter-bar { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
    .f-btn { background: var(--bg-card); color: var(--muted); border: 1px solid var(--border); padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.9rem; transition: all 0.2s; }
    .f-btn:hover, .f-btn.active { background: rgba(88,166,255,0.1); color: var(--accent); border-color: var(--accent); }
  </style>
</head>
<body>
  <nav>
    <div class="logo">AI<span>SiteFactory</span></div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="gallery.html" style="color:#fff;">Gallery</a>
      <a href="my-sites.html">My Sites</a>
      <a href="games.html">Games</a>
      <a href="tools.html">Tools</a>
      <a href="random.html">Random</a>
      <a href="dashboard.html">Admin</a>
    </div>
  </nav>

  <div class="page-container">
    <h1>🌍 Full Gallery</h1>
    <p class="desc">Explore every single website, game, and tool generated by the AI Engine.</p>
    
    <div class="filter-bar" id="filters">
      <button class="f-btn active" data-filter="all">All Sites</button>
      <button class="f-btn" data-filter="user">🙋 Custom Sites</button>
      <button class="f-btn" data-filter="game">🎮 Games</button>
      <button class="f-btn" data-filter="tool">🔧 Tools</button>
      <button class="f-btn" data-filter="random">🎲 Random</button>
    </div>

    <div class="g-grid" id="grid">
      <p style="color:var(--muted);">Loading gallery...</p>
    </div>
  </div>

  <script>
    const API = 'https://ai-site-factory.onrender.com';
    let allData = [];
    
    function catBadge(cat){
      const map={game:['b-game','🎮 Game'],tool:['b-tool','🔧 Tool'],random:['b-random','🎲 Random'],user:['b-user','🙋 Custom']};
      const [cls,lbl] = map[cat]||['b-user','Custom'];
      return `<span class="badge ${cls}">${lbl}</span>`;
    }

    function renderSites(sites) {
      const grid = document.getElementById('grid');
      if (sites.length === 0) {
        grid.innerHTML = '<p style="color:var(--muted); grid-column: 1/-1;">No sites found.</p>';
        return;
      }
      grid.innerHTML = sites.map(s => {
        const low = s.score < 7;
        const url = `${API}/generated/${s.repoName}/index.html`;
        return `<div class="gcard">
          <div class="gprev">
            <iframe src="${url}" loading="lazy" tabindex="-1"></iframe>
            <div class="gprev-overlay"><a href="${url}" target="_blank">View Site →</a></div>
          </div>
          <div class="gbody">
            <div class="gbadges">
              <span class="badge b-score ${low ? 'low' : ''}">⭐ ${s.score}/10</span>
              ${catBadge(s.category)}
            </div>
            <div class="gtitle">${s.idea}</div>
          </div>
          <div class="gfoot">
            <a href="${url}" target="_blank">Open Live →</a>
            <a href="source.html?site=${s.repoName}" target="_blank" style="color:#aaa; font-weight:normal;">Source Code</a>
          </div>
        </div>`;
      }).join('');
    }

    async function loadSites() {
      try {
        const res = await fetch(`${API}/api/sites`);
        allData = await res.json();
        renderSites(allData);
      } catch (err) {
        document.getElementById('grid').innerHTML = `<p style="color:#f87070;">Error loading gallery.</p>`;
      }
    }
    
    document.getElementById('filters').addEventListener('click', e => {
      if(!e.target.classList.contains('f-btn')) return;
      document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      const filter = e.target.dataset.filter;
      if(filter === 'all') renderSites(allData);
      else renderSites(allData.filter(s => s.category === filter));
    });

    loadSites();
  </script>
</body>
</html>
