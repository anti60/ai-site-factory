<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Memory Match Game</title><style>body{margin:0;padding:0;font-family:'Inter', sans-serif;background:linear-gradient(135deg, rgba(255,255,255,0.1), rgba(0,0,0,0.1));display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;}h1{color:#ffffff;text-align:center;}#game{display:grid;grid-template-columns:repeat(4, 1fr);grid-gap:10px;width:80vw;} .card{width:100px;height:100px;background:rgba(255, 255, 255, 0.2);backdrop-filter:blur(10px);border-radius:10px;display:flex;justify-content:center;align-items:center;font-size:24px;color:#58a6ff;cursor:pointer;user-select:none;}#score{color:white;font-size:24px;margin-top:20px;}#restart{margin-top:10px;padding:10px 20px;background-color:#58a6ff;color:white;border:none;border-radius:5px;cursor:pointer;}#restart:hover{background-color:#4a9bdc;} @media (max-width: 600px){#game{grid-template-columns:repeat(2, 1fr);}} </style><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet"></head><body><h1>Memory Match Game</h1><div id="score">Score: 0</div><div id="game"></div><button id="restart">Restart</button><script>const cardsArray = ['🍎', '🍌', '🍇', '🍒', '🍉', '🍍', '🍓', '🍊'];let gameCards = [...cardsArray, ...cardsArray].sort(() => Math.random() - 0.5);const gameContainer = document.getElementById('game');let firstCard, secondCard, score = 0;let lockBoard = false;function createBoard(){gameCards.forEach(card => {const cardElement = document.createElement('div');cardElement.classList.add('card');cardElement.dataset.cardValue = card;cardElement.textContent = '?';cardElement.addEventListener('mousedown', flipCard);gameContainer.appendChild(cardElement);});}function flipCard(event){if(lockBoard)return;let clickedCard = event.target;if(clickedCard === firstCard)return;clickedCard.textContent = clickedCard.dataset.cardValue;clickedCard.classList.add('flipped');if(!firstCard){firstCard = clickedCard;return;}secondCard = clickedCard;lockBoard = true;checkForMatch();}function checkForMatch(){if(firstCard.dataset.cardValue === secondCard.dataset.cardValue){score++;document.getElementById('score').textContent = 'Score: ' + score;resetCards();}else{setTimeout(() => {firstCard.textContent = '?';secondCard.textContent = '?';resetCards();}, 1000);}}function resetCards(){[firstCard, secondCard] = [null, null];lockBoard = false;}function restartGame(){score = 0;document.getElementById('score').textContent = 'Score: ' + score;gameContainer.innerHTML = '';createBoard();}document.getElementById('restart').addEventListener('click', restartGame);createBoard();</script><a href="https://ai-site-factory-green.vercel.app" id="__back_btn" style="position:fixed;bottom:20px;right:20px;z-index:99999;background:rgba(10,10,15,0.9);backdrop-filter:blur(10px);color:#58a6ff;border:1px solid rgba(88,166,255,0.4);padding:10px 18px;border-radius:50px;font-family:sans-serif;font-size:14px;font-weight:600;text-decoration:none;box-shadow:0 4px 20px rgba(0,0,0,0.5);">← AI Site Factory</a></body></html>
