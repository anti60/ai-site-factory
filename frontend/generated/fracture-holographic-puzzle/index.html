<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Endless Runner Game</title><style>body{margin:0;background-color:#000;color:#fff;font-family:'Syne', sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden;}canvas{border:1px solid #fff;}#score{position:absolute;top:10px;left:10px;font-size:24px;}#restart{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#333;padding:20px;border-radius:10px;cursor:pointer;}#restart:hover{background:#444;}</style><link href='https://fonts.googleapis.com/css2?family=Syne:wght@400&display=swap' rel='stylesheet'></head><body><canvas id='gameCanvas' width='800' height='400'></canvas><div id='score'>Score: 0</div><div id='restart'>Restart</div><script>const canvas=document.getElementById('gameCanvas');const ctx=canvas.getContext('2d');let score=0;let isGameOver=false;let obstacles=[];const player={x:50,y:300,width:30,height:30};function drawPlayer(){ctx.fillStyle='#58a6ff';ctx.fillRect(player.x,player.y,player.width,player.height);}function drawObstacles(){ctx.fillStyle='#ff4757';obstacles.forEach(obstacle=>{ctx.fillRect(obstacle.x,obstacle.y,obstacle.width,obstacle.height);});}function updateObstacles(){if(Math.random()<0.02){obstacles.push({x:canvas.width,y:canvas.height-30,width:20,height:30});}obstacles.forEach(obstacle=>{obstacle.x-=6;});obstacles=obstacles.filter(obstacle=>obstacle.x+obstacle.width>0);}function collisionDetection(){for(let i=0;i<obstacles.length;i++){if(player.x<obstacles[i].x+obstacles[i].width&&player.x+player.width>obstacles[i].x&&player.y<obstacles[i].y+obstacles[i].height&&player.y+player.height>obstacles[i].y){isGameOver=true;}}}function drawScore(){ctx.fillStyle='#fff';ctx.font='24px Syne';ctx.fillText('Score: '+score,10,30);}function resetGame(){score=0;isGameOver=false;obstacles=[];document.getElementById('restart').style.display='none';}function gameLoop(){if(isGameOver){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#ff4757';ctx.fillText('Game Over!',canvas.width/2-50,canvas.height/2-20);document.getElementById('restart').style.display='block';return;}ctx.clearRect(0,0,canvas.width,canvas.height);drawPlayer();drawObstacles();updateObstacles();collisionDetection();score++;drawScore();requestAnimationFrame(gameLoop);}document.addEventListener('keydown',function(event){if(event.code==='Space'&&!isGameOver){player.y-=50;setTimeout(()=>{player.y+=50;},300);}});document.getElementById('restart').addEventListener('click',function(){resetGame();gameLoop();});gameLoop();</script><a href='https://ai-site-factory-green.vercel.app' id='__back_btn' style='position:fixed;bottom:20px;right:20px;z-index:99999;background:rgba(10,10,15,0.9);backdrop-filter:blur(10px);color:#58a6ff;border:1px solid rgba(88,166,255,0.4);padding:10px 18px;border-radius:50px;font-family:sans-serif;font-size:14px;font-weight:600;text-decoration:none;box-shadow:0 4px 20px rgba(0,0,0,0.5);'>← AI Site Factory</a></body></html>
