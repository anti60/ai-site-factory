<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Fracture</title><style>:root{--primary:#1a1a2e;--secondary:#16213e;--accent:#58a6ff;font-family:'Inter', sans-serif;}body{margin:0;background-color:var(--primary);overflow:hidden;}canvas{display:block;width:100%;height:100vh;max-width:100%;max-height:100vh;}#tutorial{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background-color:rgba(255,255,255,0.9);border:2px solid var(--accent);padding:20px;border-radius:10px;display:none;z-index:1000;}.highlight{color:var(--accent);font-weight:600;}</style></head><body><canvas id='game-canvas'></canvas><div id='hud' style='position:absolute;top:20px;left:20px;color:var(--accent);font-size:24px;font-weight:600;'>Score: <span id='score'>0</span></div><button id='restart-btn' style='position:absolute;top:20px;right:20px;background-color:var(--secondary);color:var(--accent);border:none;padding:10px 20px;font-size:18px;cursor:pointer;'>Restart</button><div id='tutorial'><h2>Welcome to <span class='highlight'>Fracture</span>!</h2><p>Repair the neural network by rotating and aligning the fractured nodes.</p><p>Tap and drag nodes to connect them. Score points for each successful connection!</p><button id='close-tutorial' style='background-color:var(--secondary);color:var(--accent);border:none;padding:10px 20px;cursor:pointer;font-size:16px;'>Close Tutorial</button></div><script>const canvas = document.getElementById('game-canvas');const ctx = canvas.getContext('2d');const hud = document.getElementById('hud');const scoreDisplay = document.getElementById('score');const restartBtn = document.getElementById('restart-btn');const tutorial = document.getElementById('tutorial');const closeTutorialBtn = document.getElementById('close-tutorial');let score = 0;let nodes = [];let connections = [];let draggedNode = null;let loading = true;let errorOccurred = false;let FractureNode = function(x, y, radius, color){this.x = x;this.y = y;this.radius = radius;this.color = color;this.rotation = 0;this.fractured = true;this.update = function(){ctx.beginPath();ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);ctx.fillStyle = this.fractured? '#fff' : this.color;ctx.fill();ctx.beginPath();ctx.arc(this.x, this.y, this.radius / 2, 0, Math.PI * 2);ctx.fillStyle = this.fractured? '#fff' : this.color;ctx.fill();ctx.save();ctx.translate(this.x, this.y);ctx.rotate(this.rotation);ctx.beginPath();ctx.moveTo(0, -this.radius);ctx.lineTo(-this.radius / 2, this.radius / 2);ctx.lineTo(this.radius / 2, this.radius / 2);ctx.closePath();ctx.fillStyle = this.fractured? '#fff' : this.color;ctx.fill();ctx.restore();};};let FractureConnection = function(node1, node2, color){this.node1 = node1;this.node2 = node2;this.color = color;this.update = function(){ctx.beginPath();ctx.moveTo(node1.x, node1.y);ctx.lineTo(node2.x, node2.y);ctx.strokeStyle = this.color;ctx.stroke();};};function init(){canvas.width = window.innerWidth;canvas.height = window.innerHeight;for(let i = 0; i < 10; i++){let node = new FractureNode(Math.random() * canvas.width, Math.random() * canvas.height, 20, `hsl(${Math.random() * 360}, 100%, 50%)`);nodes.push(node);for(let j = 0; j < nodes.length - 1; j++){let connection = new FractureConnection(node, nodes[j], `hsl(${Math.random() * 360}, 100%, 50%)`);connections.push(connection);}}loading = false;};function update(){ctx.clearRect(0, 0, canvas.width, canvas.height);nodes.forEach(node => node.update());connections.forEach(connection => connection.update());};function draw(){requestAnimationFrame(draw);update();};function showTutorial() {tutorial.style.display = 'block';}function hideTutorial() {tutorial.style.display = 'none';}init();draw();showTutorial();canvas.addEventListener('touchstart', (e) => {if (loading) return;let touches = e.changedTouches;for(let i = 0; i < touches.length; i++){let touch = touches[i];let node = nodes.find(node => Math.hypot(node.x - touch.clientX, node.y - touch.clientY) < node.radius);if(node){draggedNode = node;}}});canvas.addEventListener('touchmove', (e) => {if(loading || !draggedNode) return;let touch = e.touches[0];draggedNode.x = touch.clientX;draggedNode.y = touch.clientY;let connectedNodes = nodes.filter(node => node!== draggedNode && Math.hypot(node.x - draggedNode.x, node.y - draggedNode.y) < 100);if(connectedNodes.length > 0){connectedNodes.forEach(node => {if(node.fractured){node.fractured = false;score++;scoreDisplay.textContent = score;}});}});canvas.addEventListener('touchend', () => {draggedNode = null;});restartBtn.addEventListener('click', () => {score = 0;scoreDisplay.textContent = score;nodes = [];connections = [];init();});closeTutorialBtn.addEventListener('click', hideTutorial);</script><a href='https://ai-site-factory-green.vercel.app' id='__back_btn' style='position:fixed;bottom:20px;right:20px;z-index:99999;background:rgba(10,10,15,0.9);backdrop-filter:blur(10px);color:#58a6ff;border:1px solid rgba(88,166,255,0.4);padding:10px 18px;border-radius:50px;font-family:sans-serif;font-size:14px;font-weight:600;text-decoration:none;box-shadow:0 4px 20px rgba(0,0,0,0.5);'>← AI Site Factory</a></body></html>
