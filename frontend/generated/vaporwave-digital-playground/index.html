<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaporwave Digital Playground</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #ff77ff, #00bfff);
            color: #fff;
        }
        h1 {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3em;
            text-shadow: 0 0 20px rgba(255, 0, 255, 0.7);
            animation: fadeIn 5s infinite alternate;
            z-index: 1;
            pointer-events: none;
        }
        @keyframes fadeIn {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        @media (max-width: 600px) {
            h1 {
                font-size: 2em;
            }
        }
        #__back_btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 99999;
            background: rgba(10,10,15,0.9);
            backdrop-filter: blur(10px);
            color: #58a6ff;
            border: 1px solid rgba(88,166,255,0.4);
            padding: 10px 18px;
            border-radius: 50px;
            font-family: sans-serif;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        #__back_btn:hover {
            background: rgba(88,166,255,0.2);
        }
    </style>
</head>
<body>
    <h1>Welcome to the Vaporwave Realm</h1>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];

        function randomBetween(min, max) {
            return Math.random() * (max - min) + min;
        }

        function Particle(x, y) {
            this.x = x;
            this.y = y;
            this.size = randomBetween(5, 10);
            this.speedX = randomBetween(-2, 2);
            this.speedY = randomBetween(-2, 2);
            this.color = `hsl(${randomBetween(0, 360)}, 100%, 50%)`;
        }

        Particle.prototype.update = function() {
            this.x += this.speedX;
            this.y += this.speedY;
            if (this.size > 0.2) this.size -= 0.1;
        };

        Particle.prototype.draw = function() {
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.closePath();
            ctx.fill();
        };

        function init() {
            for (let i = 0; i < 100; i++) {
                particles.push(new Particle(randomBetween(0, canvas.width), randomBetween(0, canvas.height)));
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((particle, index) => {
                particle.update();
                particle.draw();
                if (particle.size <= 0.3) {
                    particles.splice(index, 1);
                    particles.push(new Particle(randomBetween(0, canvas.width), randomBetween(0, canvas.height)));
                }
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        try {
            init();
            animate();
        } catch (error) {
            console.error('Error during animation:', error);
        }
    </script>
    <a href="https://ai-site-factory-green.vercel.app" id="__back_btn">← Back</a>
</body>
</html>
