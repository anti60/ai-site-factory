<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Video Chat Platform</title><link href='https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap' rel='stylesheet'><style>:root { --primary: #3b0764; --secondary: #a78bfa; --accent: #f0abfc; } body { margin: 0; font-family: 'Inter', sans-serif; background-color: #121212; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; animation: fadeIn 1s; } @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } } header { position: absolute; top: 20px; left: 20px; z-index: 1000; } h1 { font-size: 2.5rem; color: var(--accent); transition: all 0.3s; } h1:hover { color: var(--secondary); } .video-feed { width: 80%; height: 60%; border: 2px solid var(--accent); border-radius: 15px; display: flex; align-items: center; justify-content: center; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); animation: pulse 2s infinite; } @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } } .controls { margin-top: 20px; display: flex; gap: 20px; } button { padding: 10px 20px; border: none; border-radius: 10px; background-color: var(--secondary); color: #fff; cursor: pointer; transition: background-color 0.3s; } button:hover { background-color: var(--accent); } footer { position: fixed; bottom: 20px; right: 20px; z-index: 99999; background: rgba(10, 10, 15, 0.8); backdrop-filter: blur(10px); color: #58a6ff; border: 1px solid rgba(88, 166, 255, 0.4); padding: 10px 18px; border-radius: 50px; font-size: 14px; font-weight: 600; text-decoration: none; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5); } footer a:hover { color: var(--secondary); }</style></head><body><header><h1>Video Chat Platform</h1></header><div class='video-feed' id='videoFeed'>Video Feed Area</div><div class='controls'><button id='avatarBtn'>Select Avatar</button><button id='chatRoomBtn'>Create Chat Room</button></div><footer><a href='https://ai-site-factory-green.vercel.app' id='__back_btn'>← AI Site Factory</a></footer><script>document.getElementById('avatarBtn').addEventListener('click', function() { alert('Avatar selection feature coming soon!'); }); document.getElementById('chatRoomBtn').addEventListener('click', function() { alert('Chat room creation feature coming soon!'); });</script></body></html>
