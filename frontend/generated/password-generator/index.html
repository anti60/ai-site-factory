<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #111111;
            --secondary: #e5e5e5;
            --accent: #999999;
            --button-background: #58a6ff;
            --button-hover: #4a9fd8;
        }
        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: var(--primary);
            color: var(--secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            transition: background-color 0.3s;
        }
        .container {
            text-align: center;
            background: rgba(20, 20, 30, 0.9);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.5s;
        }
        h1 {
            margin-bottom: 20px;
        }
        button {
            background-color: var(--button-background);
            color: var(--primary);
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.2s;
        }
        button:hover {
            background-color: var(--button-hover);
            transform: scale(1.05);
        }
        input {
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid var(--accent);
            width: 100%;
            max-width: 300px;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @media (max-width: 768px) {
            button, input {
                width: 90%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Password Generator</h1>
        <p>Enter your desired password length and click the button to generate a secure password.</p>
        <input type="number" id="length" min="6" max="30" value="12" placeholder="Length (6-30)"/>
        <input type="text" id="password" readonly placeholder="Your secure password will appear here">
        <button id="generate">Generate Password</button>
        <p id="loading" style="display:none;">Generating password...</p>
    </div>
    <script>
        function generatePassword(length) {
            const charset = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()';
            let password = '';
            for (let i = 0; i < length; i++) {
                const randomIndex = Math.floor(Math.random() * charset.length);
                password += charset[randomIndex];
            }
            return password;
        }
        document.getElementById('generate').addEventListener('click', function() {
            try {
                const length = parseInt(document.getElementById('length').value);
                if (length < 6 || length > 30) {
                    alert('Please enter a length between 6 and 30.');
                    return;
                }
                document.getElementById('loading').style.display = 'block';
                const password = generatePassword(length);
                document.getElementById('password').value = password;
                document.getElementById('loading').style.display = 'none';
            } catch (error) {
                console.error('Error generating password:', error);
                document.getElementById('loading').style.display = 'none';
            }
        });
    </script>
    <a href="https://ai-site-factory-green.vercel.app" id="__back_btn" style="position:fixed;bottom:20px;right:20px;z-index:99999;background:rgba(10,10,15,0.9);backdrop-filter:blur(10px);color:#58a6ff;border:1px solid rgba(88,166,255,0.4);padding:10px 18px;border-radius:50px;font-family:sans-serif;font-size:14px;font-weight:600;text-decoration:none;box-shadow:0 4px 20px rgba(0,0,0,0.5);">← AI Site Factory</a>
</body>
</html>
