<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Holographic Galaxy Experience</title><style>body{margin:0;padding:0;overflow:hidden;font-family:'Space Grotesk', sans-serif;background-color:#000;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh}.canvas-container{position:relative;width:100vw;height:100vh;overflow:hidden;display:flex;justify-content:center;align-items:center;perspective:1000px}.particle{position:absolute;width:10px;height:10px;background-color:rgba(88,166,255,0.8);border-radius:50%;transform:translateZ(0);will-change:transform}.title{position:absolute;top:20px;left:50%;transform:translateX(-50%);font-size:3rem;color:rgba(255,255,255,0.8);text-shadow:0 0 20px rgba(88,166,255,0.5);z-index:10}@keyframes glow {0% { text-shadow: 0 0 5px rgba(88,166,255,0.6), 0 0 10px rgba(88,166,255,0.7), 0 0 15px rgba(88,166,255,0.9);} 50% { text-shadow: 0 0 10px rgba(88,166,255,1), 0 0 20px rgba(88,166,255,0.8), 0 0 30px rgba(88,166,255,0.6);} 100% { text-shadow: 0 0 5px rgba(88,166,255,0.6), 0 0 10px rgba(88,166,255,0.7), 0 0 15px rgba(88,166,255,0.9);}}.title {animation: glow 1.5s infinite;} </style></head><body><div class='canvas-container'><div class='title'>Holographic Galaxy</div></div><script>const particles=[];const maxParticles=100;const container=document.querySelector('.canvas-container');function createParticle(){const particle=document.createElement('div');particle.className='particle';particle.style.opacity=Math.random();particle.style.transform=`translate3d(${Math.random()*100-50}vw, ${Math.random()*100-50}vh, ${Math.random()*100-50}vw) scale(${Math.random()})`;container.appendChild(particle);particles.push(particle);if(particles.length>maxParticles){container.removeChild(particles.shift());}}function animateParticles(){createParticle();particles.forEach(p=>{const x=Math.random()*2-1,y=Math.random()*2-1,z=Math.random()*2-1;const currentTransform=p.style.transform.replace(/translate3d\(([^)]+)\)/,`translate3d(${$1.split(',').map((v,i)=>parseFloat(v)+[x,y,z][i]*2).join(',')})`); p.style.transform=currentTransform;});requestAnimationFrame(animateParticles);}animateParticles();document.addEventListener('mousemove',e=>{const x=(e.clientX/window.innerWidth-0.5)*2;const y=(e.clientY/window.innerHeight-0.5)*2;document.querySelectorAll('.particle').forEach(p=>{p.style.transform+=` translate3d(${x*5}px,${y*5}px,0)`;});});</script><a href='http://localhost:4000' id='__back_btn' style='position:fixed;bottom:20px;right:20px;z-index:99999;background:rgba(10,10,15,0.9);backdrop-filter:blur(10px);color:#58a6ff;border:1px solid rgba(88,166,255,0.4);padding:10px 18px;border-radius:50px;font-family:sans-serif;font-size:14px;font-weight:600;text-decoration:none;box-shadow:0 4px 20px rgba(0,0,0,0.5);'>← AI Site Factory</a></body></html>
