<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Challenge Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            background-color: #eaeaea;
            color: #1b1b1b;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        h1 {
            margin: 20px 0;
            font-size: 2.5em;
            text-align: center;
            color: #ff4081;
        }
        #word {
            font-size: 3em;
            font-weight: 600;
            padding: 20px;
            border: 2px solid #58a6ff;
            border-radius: 10px;
            background-color: #fff;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            transition: all 0.3s;
        }
        #input {
            font-size: 2em;
            padding: 10px;
            width: 300px;
            border: 2px solid #58a6ff;
            border-radius: 10px;
            margin-top: 20px;
            transition: border-color 0.3s;
        }
        #input.correct {
            border-color: #4caf50;
        }
        #input.wrong {
            border-color: #f44336;
        }
        #score {
            font-size: 1.5em;
            margin-top: 20px;
            color: #333;
        }
        #timer {
            font-size: 1.5em;
            margin-top: 10px;
            color: #333;
        }
        #restart {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1em;
            border: none;
            border-radius: 50px;
            background-color: #ff4081;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            transition: background-color 0.3s;
        }
        #restart:hover {
            background-color: #e63946;
        }
        @media (max-width: 600px) {
            #input {
                width: 80%;
                font-size: 1.5em;
            }
            #word {
                font-size: 2em;
            }
            h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <h1>Typing Challenge</h1>
    <div id="word">Start Typing!</div>
    <input type="text" id="input" autofocus />
    <div id="score">Score: 0</div>
    <div id="timer">Time: 30</div>
    <button id="restart" style="display: none;" title="Click to restart the game">Restart</button>

    <script>
        const words = ['apple', 'banana', 'grape', 'orange', 'pineapple', 'strawberry', 'blueberry', 'kiwi'];
        let currentWord = '';
        let score = 0;
        let gameStarted = false;
        let timer;
        let timeLeft = 30;

        function newWord() {
            currentWord = words[Math.floor(Math.random() * words.length)];
            document.getElementById('word').innerText = currentWord;
        }

        function startGame() {
            score = 0;
            timeLeft = 30;
            document.getElementById('score').innerText = 'Score: ' + score;
            document.getElementById('timer').innerText = 'Time: ' + timeLeft;
            document.getElementById('restart').style.display = 'none';
            gameStarted = true;
            newWord();
            startTimer();
        }

        function startTimer() {
            timer = setInterval(function() {
                timeLeft--;
                document.getElementById('timer').innerText = 'Time: ' + timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    gameStarted = false;
                    document.getElementById('restart').style.display = 'block';
                }
            }, 1000);
        }

        document.getElementById('input').addEventListener('input', function() {
            if (!gameStarted) {
                startGame();
            }
            if (this.value === currentWord) {
                score++;
                this.classList.remove('wrong');
                this.classList.add('correct');
                document.getElementById('score').innerText = 'Score: ' + score;
                this.value = '';
                newWord();
            } else {
                this.classList.remove('correct');
                this.classList.add('wrong');
            }
        });

        document.getElementById('restart').addEventListener('click', startGame);

        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                gameStarted = false;
                clearInterval(timer);
                document.getElementById('restart').style.display = 'block';
            }
        });
    </script>

    <a href="https://ai-site-factory-green.vercel.app" id="__back_btn" style="position:fixed;bottom:20px;right:20px;z-index:99999;background:rgba(10,10,15,0.9);backdrop-filter:blur(10px);color:#58a6ff;border:1px solid rgba(88,166,255,0.4);padding:10px 18px;border-radius:50px;font-family:sans-serif;font-size:14px;font-weight:600;text-decoration:none;box-shadow:0 4px 20px rgba(0,0,0,0.5);">← AI Site Factory</a>
</body>
</html>
