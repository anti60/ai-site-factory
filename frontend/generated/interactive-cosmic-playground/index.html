<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Cosmic Playground</title><style>body { margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; background: #0a0a0f; color: #ffffff; } canvas { position: absolute; top: 0; left: 0; } #description { position: absolute; top: 20px; left: 20px; z-index: 10; font-size: 1.2em; color: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); padding: 10px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.2); } </style><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet"></head><body><div id="description">Move your mouse to create stars!</div><canvas id="canvas"></canvas><script>const canvas = document.getElementById("canvas"); const ctx = canvas.getContext("2d"); let particles = []; const numParticles = 200; canvas.width = window.innerWidth; canvas.height = window.innerHeight; class Particle { constructor(x, y) { this.x = x; this.y = y; this.size = Math.random() * 5 + 1; this.speedX = Math.random() * 3 - 1.5; this.speedY = Math.random() * 3 - 1.5; } update() { this.x += this.speedX; this.y += this.speedY; if (this.size > 0.2) this.size -= 0.1; } draw() { ctx.fillStyle = "rgba(255, 255, 255, 0.8)"; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.closePath(); ctx.fill(); } } function createParticles(e) { const xPos = e.x; const yPos = e.y; for (let i = 0; i < 5; i++) { particles.push(new Particle(xPos, yPos)); } } function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach((particle, index) => { particle.update(); particle.draw(); if (particle.size <= 0.2) { particles.splice(index, 1); } }); requestAnimationFrame(animate); } canvas.addEventListener("mousemove", createParticles); animate();</script><a href="http://localhost:4000" id="__back_btn" style="position:fixed;bottom:20px;right:20px;z-index:99999;background:rgba(10,10,15,0.9);backdrop-filter:blur(10px);color:#58a6ff;border:1px solid rgba(88,166,255,0.4);padding:10px 18px;border-radius:50px;font-family:sans-serif;font-size:14px;font-weight:600;text-decoration:none;box-shadow:0 4px 20px rgba(0,0,0,0.5);">← AI Site Factory</a></body></html>
