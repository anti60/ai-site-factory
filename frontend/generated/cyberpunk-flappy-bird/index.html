<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Sci-Fi Endless Runner</title><style>body{margin:0;background:#000;color:#fff;font-family:'Inter', sans-serif;overflow:hidden}#gameCanvas{border:2px solid rgba(255, 255, 255, 0.1);background:linear-gradient(180deg, rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.9));position:absolute;left:0;right:0;top:0;bottom:0;margin:auto}.hud{position:absolute;top:20px;left:20px}#score{font-size:24px}#restartBtn{display:none;background:rgba(10,10,15,0.9);border:none;color:#58a6ff;padding:10px 20px;border-radius:10px;cursor:pointer;transform:scale(1);transition:transform 0.2s}#restartBtn:hover{transform:scale(1.1)}</style><link href='https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap' rel='stylesheet'></head><body><div class='hud'><div id='score'>Score: 0</div><button id='restartBtn'>Restart</button></div><canvas id='gameCanvas'></canvas><script>const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;let player={x:100,y:canvas.height-100,width:50,height:50,color:'rgba(88,166,255,1)',speed:10},obstacles=[],score=0,gameOver=false;function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}function spawnObstacle(){const size=Math.random()*50+20;const obstacle={x:canvas.width,y:canvas.height-size,width:size,height:size,color:'rgba(255,0,0,1)'};obstacles.push(obstacle);}function drawPlayer(){ctx.fillStyle=player.color;ctx.fillRect(player.x,player.y,player.width,player.height);}function drawObstacles(){for(const obs of obstacles){ctx.fillStyle=obs.color;ctx.fillRect(obs.x,obs.y=canvas.height-obs.height,obs.width,obs.height);obs.x-=5;}}function updateScore(){score+=1;document.getElementById('score').innerText='Score: '+score;}function resetGame(){player.x=100;player.y=canvas.height-100;obstacles=[];score=0;gameOver=false;document.getElementById('restartBtn').style.display='none';}function gameLoop(){if(gameOver){return;}ctx.clearRect(0,0,canvas.width,canvas.height);drawPlayer();drawObstacles();if(obstacles.length===0||obstacles[obstacles.length-1].x<canvas.width-200){spawnObstacle();}updateScore();for(const obs of obstacles){if(obs.x<player.x+player.width&&obs.x+obs.width>player.x&&obs.y<player.y+player.height){gameOver=true;document.getElementById('restartBtn').style.display='block';}}requestAnimationFrame(gameLoop);}function handleKeyDown(event){if(event.code==='ArrowUp'||event.code==='Space'||event.code==='Enter'){if(!gameOver){player.y-=player.speed;}else{resetGame();}}}document.addEventListener('keydown',handleKeyDown);document.getElementById('restartBtn').onclick=resetGame;resizeCanvas();gameLoop();window.addEventListener('resize',resizeCanvas);setInterval(spawnObstacle,1500);</script><a href='https://ai-site-factory-green.vercel.app' id='__back_btn' style='position:fixed;bottom:20px;right:20px;z-index:99999;background:rgba(10,10,15,0.9);backdrop-filter:blur(10px);color:#58a6ff;border:1px solid rgba(88,166,255,0.4);padding:10px 18px;border-radius:50px;font-family:sans-serif;font-size:14px;font-weight:600;text-decoration:none;box-shadow:0 4px 20px rgba(0,0,0,0.5);'>← AI Site Factory</a></body></html>
