<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Cyberpunk Flappy Bird</title><style>body{margin:0;background:#111111;color:#e5e5e5;font-family:'Space Grotesk', sans-serif;display:flex;justify-content:center;align-items:center;overflow:hidden;}.game-container{position:relative;width:100vw;height:100vh;overflow:hidden;display:flex;justify-content:center;align-items:center;}.bird{position:absolute;top:50%;left:20%;width:50px;height:50px;background:linear-gradient(45deg,#58a6ff,#f7a2ff);border-radius:50%;animation:flap 0.5s infinite;}.pipe{position:absolute;right:0;width:50px;background:#999999;}.scoreboard{position:absolute;top:20px;left:20px;font-size:24px;color:#e5e5e5;}.game-over{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(10,10,15,0.9);border:1px solid #58a6ff;padding:20px;border-radius:10px;display:none;}.restart{background:#58a6ff;color:#111111;padding:10px 20px;border:none;border-radius:5px;cursor:pointer;}.hidden{display:none;}@keyframes flap{0%,100%{transform:translateY(0);}50%{transform:translateY(-20px);}}@keyframes move-pipe{0%{transform:translateX(100vw);}100%{transform:translateX(-50px);}}@media (max-width:768px){.bird{width:30px;height:30px;}.scoreboard{font-size:18px;}.game-over{font-size:18px;}.restart{padding:5px 10px;}}@media (max-width:375px){.bird{width:25px;height:25px;}.scoreboard{font-size:16px;}.game-over{font-size:16px;}.restart{padding:5px 10px;}}</style></head><body><div class='game-container'><div class='bird' id='bird'></div><div class='scoreboard' id='scoreboard'>Score: 0</div><div class='game-over' id='game-over'><div>Game Over!</div><button class='restart' id='restart'>Restart</button></div></div><script>let bird=document.getElementById('bird'),scoreboard=document.getElementById('scoreboard'),gameOverScreen=document.getElementById('game-over'),restartButton=document.getElementById('restart');let jumping=false,score=0;function flap(){if(!jumping){jumping=true;bird.style.transition='top 0.5s';bird.style.top=(parseInt(bird.style.top)||50)-20+'%';setTimeout(()=>{bird.style.transition='top 0.2s';bird.style.top=(parseInt(bird.style.top)||50)+20+'%';jumping=false;},500);}}function createPipe(){let pipe=document.createElement('div');pipe.className='pipe';pipe.style.height=Math.random()*70+30+'%';pipe.style.top=Math.random()*30+'%';document.body.appendChild(pipe);pipe.style.animation='move-pipe 5s linear infinite';pipe.addEventListener('animationiteration',()=>{pipe.remove();score++;scoreboard.innerText='Score: '+score;});setTimeout(()=>{if(parseInt(pipe.style.left)<80 && parseInt(bird.style.left)>0){gameOver();}},5000);};function gameOver(){gameOverScreen.style.display='block';document.removeEventListener('keydown',flap);clearInterval(pipeInterval);}let pipeInterval=setInterval(createPipe,1500);document.addEventListener('keydown',flap);restartButton.addEventListener('click',()=>{location.reload();});</script></body></html>
