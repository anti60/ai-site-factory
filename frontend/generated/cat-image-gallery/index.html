<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Cat Image Gallery</title><link href='https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap' rel='stylesheet'><style>:root { --bg-color: #121212; --text-color: #ffffff; --accent-color: #ff5722; --transition: 0.3s; } body { margin: 0; font-family: 'Outfit', sans-serif; background-color: var(--bg-color); color: var(--text-color); } header { display: flex; justify-content: space-between; padding: 20px; background-color: rgba(0, 0, 0, 0.8); } nav ul { list-style: none; padding: 0; } nav ul li { display: inline; margin: 0 15px; } nav ul li a { color: var(--accent-color); text-decoration: none; transition: var(--transition); } nav ul li a:hover { color: var(--text-color); } main { padding: 20px; text-align: center; } .cat-image { width: 100%; max-width: 600px; border-radius: 10px; margin-top: 20px; transition: var(--transition); } .cat-image:hover { transform: scale(1.02); } footer { text-align: center; margin-top: 20px; } @media (max-width: 600px) { nav ul li { display: block; margin: 10px 0; } } </style></head><body><header><h1>Cat Image Gallery</h1><nav><ul><li><a href='#'>Home</a></li><li><a href='#' id='fetch-cat'>Get a Cat Image</a></li><li><a href='#'>About</a></li><li><a href='#'>Contact</a></li></ul></nav></header><main><section id='cat-container'> <img id='cat-image' class='cat-image' src='' alt='A cute cat' style='display:none;'> <p id='loading' style='display:none;'>Loading...</p> <p id='error' style='display:none; color: red;'>Failed to load cat image. Please try again.</p> </section></main><footer><p>&copy; 2023 Cat Image Gallery</p></footer><script>document.getElementById('fetch-cat').addEventListener('click', function(event) { event.preventDefault(); const catImage = document.getElementById('cat-image'); const loading = document.getElementById('loading'); const error = document.getElementById('error'); loading.style.display = 'block'; catImage.style.display = 'none'; error.style.display = 'none'; fetch('https://api.thecatapi.com/v1/images/search') .then(response => response.json()) .then(data => { loading.style.display = 'none'; catImage.src = data[0].url; catImage.style.display = 'block'; }) .catch(err => { loading.style.display = 'none'; error.style.display = 'block'; }); });</script></body></html>
