<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>AI Aesthetic Endless Runner</title><style>body{margin:0;background:#1e1e2f;color:#fff;font-family:'DM Sans', sans-serif;overflow:hidden;display:flex;justify-content:center;align-items:center;height:100vh;}.game{position:relative;width:100%;max-width:800px;height:400px;border:2px solid #58a6ff;overflow:hidden;}.canvas{width:100%;height:100%;background:#121212;}.hud{position:absolute;top:10px;left:10px;z-index:10;font-size:24px;}.btn{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);padding:10px 20px;background:rgba(88,166,255,0.6);border:none;border-radius:5px;color:white;cursor:pointer;font-size:18px;}.btn:focus{outline:none;}@media (max-width:500px){.btn{font-size:16px;}.canvas{height:200px;}}@media (max-width:800px){.canvas{width:100%;}}.game-over{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:32px;color:red;text-align:center;display:none;}</style><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&display=swap" rel="stylesheet"></head><body><div class="game"><canvas class="canvas" id="gameCanvas"></canvas><div class="hud">Score: <span id="score">0</span></div><button class="btn" id="restartBtn" style="display:none;">Restart</button><div class="game-over" id="gameOverMessage">Game Over!<br><button id="restartGameButton" class="btn">Play Again</button></div></div><script>const canvas=document.getElementById('gameCanvas');const ctx=canvas.getContext('2d');canvas.width=800;canvas.height=400;let score=0;let isGameOver=false;let player={x:50,y:300,width:30,height:30,dy:0};let obstacles=[];let energyOrbs=[];let frame=0;function drawPlayer(){ctx.fillStyle='#58a6ff';ctx.fillRect(player.x,player.y,player.width,player.height);}function drawObstacles(){ctx.fillStyle='red';for(let i=0;i<obstacles.length;i++){ctx.fillRect(obstacles[i].x,obstacles[i].y,obstacles[i].width,obstacles[i].height);}}function drawEnergyOrbs(){ctx.fillStyle='gold';for(let i=0;i<energyOrbs.length;i++){ctx.beginPath();ctx.arc(energyOrbs[i].x,energyOrbs[i].y,10,0,Math.PI*2);ctx.fill();}}function updateObstacles(){if(frame%100===0){const height=Math.random()*30+20;obstacles.push({x:canvas.width,y:canvas.height-height,width:20,height});}for(let i=0;i<obstacles.length;i++){obstacles[i].x-=5;if(obstacles[i].x+obstacles[i].width<0){score++;obstacles.splice(i,1);i--;}}}function updateEnergyOrbs(){if(frame%100===0){energyOrbs.push({x:canvas.width,y:Math.random()*(canvas.height-50)+20});}for(let i=0;i<energyOrbs.length;i++){energyOrbs[i].x-=5;if(energyOrbs[i].x<0){energyOrbs.splice(i,1);i--;}}}function checkCollision(){for(let i=0;i<obstacles.length;i++){if(player.x<obstacles[i].x+obstacles[i].width&&player.x+player.width>obstacles[i].x&&player.y<obstacles[i].y+obstacles[i].height&&player.y+player.height>obstacles[i].y){isGameOver=true;}}}function checkEnergyOrbCollision(){for(let i=0;i<energyOrbs.length;i++){if(player.x<energyOrbs[i].x+20&&player.x+player.width>energyOrbs[i].x-20&&player.y<energyOrbs[i].y+20&&player.y+player.height>energyOrbs[i].y-20){score+=10;energyOrbs.splice(i,1);i--;}}}function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);drawPlayer();drawObstacles();drawEnergyOrbs();ctx.fillStyle='white';ctx.font='20px DM Sans';ctx.fillText('Score: '+score,10,30);if(isGameOver){document.getElementById('gameOverMessage').style.display='block';document.getElementById('restartBtn').style.display='block';}}function update(){if(isGameOver)return;frame++;updateObstacles();updateEnergyOrbs();checkCollision();checkEnergyOrbCollision();draw();}function jump(){if(player.y===300){player.dy=-10;} player.dy+=0.5;player.y+=player.dy;if(player.y>300){player.y=300;player.dy=0;}}function restartGame(){isGameOver=false;score=0;obstacles=[];energyOrbs=[];player.y=300;document.getElementById('score').innerText=score;document.getElementById('restartBtn').style.display='none';document.getElementById('gameOverMessage').style.display='none';}document.addEventListener('keydown',function(e){if(e.code==='Space'){jump();}if(e.code==='Enter'&&isGameOver){restartGame();}});document.getElementById('restartBtn').addEventListener('click',restartGame);document.getElementById('restartGameButton').addEventListener('click',restartGame);document.addEventListener('touchstart',function(){jump();});function gameLoop(){if(!isGameOver){update();}requestAnimationFrame(gameLoop);}gameLoop();</script><a href="https://ai-site-factory-green.vercel.app" id="__back_btn" style="position:fixed;bottom:20px;right:20px;z-index:99999;background:rgba(10,10,15,0.9);backdrop-filter:blur(10px);color:#58a6ff;border:1px solid rgba(88,166,255,0.4);padding:10px 18px;border-radius:50px;font-family:sans-serif;font-size:14px;font-weight:600;text-decoration:none;box-shadow:0 4px 20px rgba(0,0,0,0.5);">← AI Site Factory</a></body></html>
