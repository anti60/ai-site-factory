<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Snake Game</title><style>body{display:flex;justify-content:center;align-items:center;height:100vh;background-color:#f0f0f0;}.game-container{position:relative;width:400px;height:400px;border:2px solid #ccc;overflow:hidden;background-color:#fff;}.snake{position:absolute;background-color:white;}.snake-head{background-color:red;}.food{position:absolute;}.emoji{font-size:20px;}</style></head><body><div class='game-container' id='game'><div class='snake' id='snake'></div><div class='food' id='food'></div></div><script>const gameContainer = document.getElementById('game');const snake = document.getElementById('snake');const food = document.getElementById('food');let snakeBody = [{x:8, y:8}];let direction = {x:0, y:0};let foodPosition = {x:Math.floor(Math.random() * 20), y:Math.floor(Math.random() * 20)};let gameInterval;const emoji = '🐍';function draw(){snake.innerHTML = '';snakeBody.forEach((segment, index) => {const segmentDiv = document.createElement('div');segmentDiv.className = 'snake' + (index === 0 ? ' snake-head' : '');segmentDiv.style.width = '20px';segmentDiv.style.height = '20px';segmentDiv.style.top = segment.y * 20 + 'px';segmentDiv.style.left = segment.x * 20 + 'px';snake.appendChild(segmentDiv);});food.innerHTML = emoji;food.style.top = foodPosition.y * 20 + 'px';food.style.left = foodPosition.x * 20 + 'px';}function update(){const head = {...snakeBody[0]};head.x += direction.x;head.y += direction.y;if (head.x === foodPosition.x && head.y === foodPosition.y) {snakeBody.unshift(head);foodPosition = {x:Math.floor(Math.random() * 20), y:Math.floor(Math.random() * 20)};}else{snakeBody.unshift(head);snakeBody.pop();}draw();}function changeDirection(event){switch(event.key){case 'ArrowUp':direction = {x:0, y:-1};break;case 'ArrowDown':direction = {x:0, y:1};break;case 'ArrowLeft':direction = {x:-1, y:0};break;case 'ArrowRight':direction = {x:1, y:0};break;}}document.addEventListener('keydown', changeDirection);function startGame(){gameInterval = setInterval(() => {update();}, 200);}startGame();</script></body></html>
