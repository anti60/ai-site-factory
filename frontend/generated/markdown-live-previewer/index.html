<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Live Previewer</title>
    <style>
        body { font-family: 'Syne', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background-color: #f8f9fa; color: #343a40; }
        #container { display: flex; flex: 1; width: 100%; }
        textarea { flex: 1; padding: 20px; border: 1px solid #ced4da; outline: none; resize: none; font-size: 16px; border-radius: 4px; }
        #preview { flex: 1; padding: 20px; border-left: 1px solid #dee2e6; overflow-y: auto; background-color: #ffffff; border-radius: 4px; }
        h1 { font-size: 24px; margin: 0 0 20px; }
        h2 { font-size: 20px; margin: 20px 0; }
        p { margin: 10px 0; }
        .error { color: red; }
        @media (max-width: 768px) { 
            #container { flex-direction: column; } 
            textarea, #preview { border: none; } 
            textarea { margin-bottom: 10px; } 
        }
    </style>
</head>
<body>
    <div id="container">
        <textarea id="markdown" placeholder="Type your markdown here..."></textarea>
        <div id="preview"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        const textarea = document.getElementById('markdown');
        const preview = document.getElementById('preview');

        textarea.addEventListener('input', () => {
            const markdownText = textarea.value;
            try {
                const htmlContent = marked(markdownText);
                preview.innerHTML = htmlContent;
            } catch (error) {
                preview.innerHTML = '<div class="error">Invalid Markdown format!</div>';
            }
        });
    </script>
    <a href="#" id="__back_btn" style="position:fixed;bottom:20px;right:20px;z-index:99999;background:rgba(10,10,15,0.9);backdrop-filter:blur(10px);color:#58a6ff;border:1px solid rgba(88,166,255,0.4);padding:10px 18px;border-radius:50px;font-family:sans-serif;font-size:14px;font-weight:600;text-decoration:none;box-shadow:0 4px 20px rgba(0,0,0,0.5);">← Back</a>
</body>
</html>
