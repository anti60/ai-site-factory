<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Syne', sans-serif;
            background: linear-gradient(to right, #0c0f15, #1d1f30);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        h1 {
            font-size: 2.5em;
            margin: 0;
            text-shadow: 0 0 5px rgba(88,166,255,0.5);
        }
        input {
            border: none;
            border-radius: 25px;
            padding: 15px;
            margin: 20px 0;
            width: 80%;
            max-width: 400px;
            font-size: 1.2em;
            outline: none;
            transition: all 0.2s ease;
        }
        input:focus {
            box-shadow: 0 0 10px rgba(88,166,255,0.8);
        }
        button {
            background: rgba(88,166,255,0.8);
            border: none;
            border-radius: 25px;
            padding: 15px 30px;
            font-size: 1.2em;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #fff;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        button:hover {
            background: rgba(88,166,255,1);
            transform: translateY(-1px);
        }
        .qr-code {
            margin-top: 20px;
            display: none;
            transition: all 0.3s ease;
        }
        .qr-code img {
            width: 250px;
            height: 250px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        @media (max-width: 600px) {
            h1 {
                font-size: 2em;
            }
            input, button {
                width: 90%;
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <h1>QR Code Generator</h1>
    <input type="text" id="inputText" placeholder="Enter text or URL...">
    <button id="generateBtn">Generate QR Code</button>
    <div class="qr-code" id="qrCodeContainer">
        <img id="qrCodeImage" src="" alt="QR Code">
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script>
        $(document).ready(function() {
            $('#generateBtn').click(function() {
                var text = $('#inputText').val().trim();
                if (text) {
                    var qrCodeUrl = 'https://api.qrserver.com/v1/create-qr-code/?data=' + encodeURIComponent(text);
                    // Adding loading state
                    $('#qrCodeContainer').hide();
                    $('#qrCodeImage').attr('src', ''); // Clear previous image
                    $('#qrCodeImage').attr('src', qrCodeUrl);
                    $('#qrCodeImage').on('load', function() {
                        $('#qrCodeContainer').fadeIn();
                    }).on('error', function() {
                        alert('Error generating QR Code. Please try again.');
                    });
                } else {
                    alert('Please enter a valid text or URL.');
                }
            });
        });
    </script>
    <a href="https://www.example.com" id="__back_btn" style="position:fixed;bottom:20px;right:20px;z-index:99999;background:rgba(10,10,15,0.9);backdrop-filter:blur(10px);color:#58a6ff;border:1px solid rgba(88,166,255,0.4);padding:10px 18px;border-radius:50px;font-family:sans-serif;font-size:14px;font-weight:600;text-decoration:none;box-shadow:0 4px 20px rgba(0,0,0,0.5);">← Back</a>
</body>
</html>
