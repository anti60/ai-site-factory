<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaporwave Typing Challenge</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Syne', sans-serif;
            background: linear-gradient(135deg, #ff77ff, #00d4ff);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        h1 {
            font-size: 3em;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
        }
        #wordDisplay {
            font-size: 2em;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
            margin: 20px;
        }
        #inputField {
            padding: 10px;
            font-size: 1.5em;
            border: none;
            border-radius: 5px;
            width: 300px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }
        #scoreBoard {
            font-size: 1.5em;
            margin: 20px;
        }
        #restartButton {
            padding: 10px 20px;
            background-color: rgba(255, 255, 255, 0.3);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.5em;
            transition: background-color 0.3s;
        }
        #restartButton:hover {
            background-color: rgba(255, 255, 255, 0.5);
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.7);
            pointer-events: none;
            animation: particle-fall 1s forwards;
        }
        @keyframes particle-fall {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(100vh); opacity: 0; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Syne&display=swap" rel="stylesheet">
</head>
<body>
    <h1>Vaporwave Typing Challenge</h1>
    <div id="wordDisplay">Press Start</div>
    <input type="text" id="inputField" placeholder="Type the word..." autofocus />
    <div id="scoreBoard">Score: <span id="score">0</span></div>
    <button id="restartButton" style="display: none;">Restart</button>
    <script>
        const words = ['NEON', 'VAPORWAVE', 'RETRO', 'CYBERPUNK', 'AESTHETIC', 'FUTURE', 'DREAM', 'WAVY'];
        let score = 0;
        let currentWord;
        let inputField = document.getElementById('inputField');
        let wordDisplay = document.getElementById('wordDisplay');
        let scoreDisplay = document.getElementById('score');
        let restartButton = document.getElementById('restartButton');

        function startGame() {
            score = 0;
            scoreDisplay.textContent = score;
            nextWord();
            inputField.value = '';
            inputField.focus();
            inputField.addEventListener('input', checkInput);
        }

        function nextWord() {
            currentWord = words[Math.floor(Math.random() * words.length)];
            wordDisplay.textContent = currentWord;
            createParticles();
        }

        function checkInput() {
            if (inputField.value.toUpperCase() === currentWord) {
                score++;
                scoreDisplay.textContent = score;
                nextWord();
                inputField.value = '';
            }
        }

        function createParticles() {
            const particleCount = 30;
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                particle.style.width = Math.random() * 10 + 'px';
                particle.style.height = particle.style.width;
                particle.style.left = Math.random() * window.innerWidth + 'px';
                particle.style.top = Math.random() * -20 + 'px';
                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 1000);
            }
        }

        restartButton.addEventListener('click', startGame);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                startGame();
                restartButton.style.display = 'none';
            }
        });

        inputField.addEventListener('focus', () => {
            if (score > 0) restartButton.style.display = 'inline';
        });

        startGame();
    </script>
    <a href="http://localhost:4000" id="__back_btn" style="position:fixed;bottom:20px;right:20px;z-index:99999;background:rgba(10,10,15,0.9);backdrop-filter:blur(10px);color:#58a6ff;border:1px solid rgba(88,166,255,0.4);padding:10px 18px;border-radius:50px;font-family:sans-serif;font-size:14px;font-weight:600;text-decoration:none;box-shadow:0 4px 20px rgba(0,0,0,0.5);">← AI Site Factory</a>
</body>
</html>
