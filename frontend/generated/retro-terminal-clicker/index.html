<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Terminal Clicker</title>
    <link href='https://fonts.googleapis.com/css2?family=Manrope:wght@400;600&display=swap' rel='stylesheet'>
    <style>
        body {
            background-color: #000;
            color: #00ff00;
            font-family: 'Manrope', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #game {
            text-align: center;
            border: 1px solid #00ff00;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
            max-width: 400px;
            width: 100%;
        }
        #commandInput {
            background-color: #1a1a1a;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 10px;
            border-radius: 5px;
            font-size: 20px;
            width: 100%;
            box-sizing: border-box;
        }
        #score {
            font-size: 24px;
            margin: 20px 0;
        }
        #upgrade {
            margin-top: 20px;
            padding: 10px 15px;
            background-color: #00ff00;
            color: #000;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        #upgrade:hover {
            background-color: #66ff66;
        }
        #upgrade:disabled {
            background-color: #404040;
            cursor: not-allowed;
        }
        @media (max-width: 400px) {
            #commandInput {
                font-size: 18px;
            }
            #upgrade {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div id="game">
        <h1>Retro Terminal Clicker</h1>
        <p>Type the command below to score points:</p>
        <input type="text" id="commandInput" autofocus />
        <div id="score">Score: 0</div>
        <button id="upgrade">Upgrade Multiplier</button>
    </div>

    <script>
        let score = 0;
        let multiplier = 1;
        const commandInput = document.getElementById('commandInput');
        const scoreDisplay = document.getElementById('score');
        const upgradeButton = document.getElementById('upgrade');

        const commands = ['score', 'reset', 'double']; // Added more commands 

        commandInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const command = commandInput.value.trim();
                commandInput.value = '';
                if (commands.includes(command)) {
                    if (command === 'score') {
                        score += 1 * multiplier;
                    } else if (command === 'reset') {
                        score = 0;
                    } else if (command === 'double') {
                        multiplier *= 2;
                    }
                    scoreDisplay.innerText = 'Score: ' + score;
                } else {
                    alert('Invalid command!');
                }
                updateUpgradeButton();
            }
        });

        upgradeButton.addEventListener('click', () => {
            if (score >= 10) {
                score -= 10;
                multiplier += 1;
                scoreDisplay.innerText = 'Score: ' + score;
                updateUpgradeButton();
            } else {
                alert('Not enough score to upgrade!');
            }
        });

        function updateUpgradeButton() {
            if (score < 10) {
                upgradeButton.disabled = true;
            } else {
                upgradeButton.disabled = false;
                upgradeButton.innerText = 'Upgrade Multiplier (' + multiplier + ')';
            }
        }

        updateUpgradeButton(); // Initial state
    </script>
    <a href="http://localhost:4000" id="__back_btn" style="position:fixed;bottom:20px;right:20px;z-index:99999;background:rgba(10,10,15,0.9);backdrop-filter:blur(10px);color:#58a6ff;border:1px solid rgba(88,166,255,0.4);padding:10px 18px;border-radius:50px;font-family:sans-serif;font-size:14px;font-weight:600;text-decoration:none;box-shadow:0 4px 20px rgba(0,0,0,0.5);">← AI Site Factory</a>
</body>
</html>
