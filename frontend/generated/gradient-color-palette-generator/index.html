<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradient Color Palette Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1a1a1a;
            color: #eaeaea;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
        }
        h1 {
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        .gradient-box {
            height: 200px;
            border-radius: 15px;
            margin-bottom: 20px;
            transition: transform 0.3s;
        }
        .color-inputs {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        .color-inputs input {
            padding: 10px;
            margin: 0 5px;
            border: none;
            border-radius: 5px;
            outline: none;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #58a6ff;
            color: #1a1a1a;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #3a8bc4;
        }
        .copy-button {
            margin-top: 10px;
            display: none;
        }
        .copy-message {
            display: none;
            margin-top: 10px;
            font-size: 0.9em;
            color: #58a6ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gradient Color Palette Generator</h1>
        <div class="gradient-box" id="gradientBox" style="background: linear-gradient(to right, #ff0000, #0000ff);"></div>
        <div class="color-inputs">
            <input type="color" id="color1" value="#ff0000">
            <input type="color" id="color2" value="#0000ff">
        </div>
        <button id="generate">Generate Gradient</button>
        <button class="copy-button" id="copyButton">Copy Gradient</button>
        <div class="copy-message" id="copyMessage">Gradient copied to clipboard!</div>
    </div>
    <script>
        const gradientBox = document.getElementById('gradientBox');
        const color1 = document.getElementById('color1');
        const color2 = document.getElementById('color2');
        const generateButton = document.getElementById('generate');
        const copyButton = document.getElementById('copyButton');
        const copyMessage = document.getElementById('copyMessage');

        const updateGradient = () => {
            const gradient = `linear-gradient(to right, ${color1.value}, ${color2.value})`;
            gradientBox.style.background = gradient;
            copyButton.style.display = 'inline-block';
            copyButton.setAttribute('data-gradient', gradient);
        };

        const copyGradient = () => {
            const gradient = copyButton.getAttribute('data-gradient');
            navigator.clipboard.writeText(gradient);
            copyMessage.style.display = 'inline';
            setTimeout(() => { copyMessage.style.display = 'none'; }, 2000);
        };

        generateButton.addEventListener('click', updateGradient);
        copyButton.addEventListener('click', copyGradient);
        color1.addEventListener('input', updateGradient);
        color2.addEventListener('input', updateGradient);
    </script>
    <a href="http://localhost:4000" id="__back_btn" style="position:fixed;bottom:20px;right:20px;z-index:99999;background:rgba(10,10,15,0.9);backdrop-filter:blur(10px);color:#58a6ff;border:1px solid rgba(88,166,255,0.4);padding:10px 18px;border-radius:50px;font-family:sans-serif;font-size:14px;font-weight:600;text-decoration:none;box-shadow:0 4px 20px rgba(0,0,0,0.5);">← AI Site Factory</a>
</body>
</html>
