<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Palette Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: radial-gradient(circle, rgba(0, 0, 0, 0.8), rgba(10, 10, 15, 0.9));
            color: #ffffff;
            text-align: center;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        h1 {
            margin-top: 50px;
            font-size: 3em;
            text-shadow: none;
        }
        .palette {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        .color {
            width: 100px;
            height: 100px;
            margin: 10px;
            border-radius: 10px;
            transition: transform 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .color:hover {
            transform: scale(1.1);
        }
        button {
            background: rgba(88,166,255,0.6);
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.2em;
            cursor: pointer;
            transition: background 0.3s;
            color: white;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
        }
        button:hover {
            background: rgba(88,166,255,0.8);
        }
        #loading {
            display: none;
            color: white;
            font-size: 1.5em;
            margin-top: 20px;
        }
        @media (max-width: 600px) {
            #__back_btn {
                position: absolute;
                bottom: 10px;
                right: 10px;
                z-index: 99999;
                padding: 8px 12px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <h1>Color Palette Generator</h1>
    <button id="generate">Generate Palette</button>
    <div id="loading">Generating...</div>
    <div class="palette" id="palette"></div>

    <script>
        document.getElementById('generate').onclick = function() {
            const paletteDiv = document.getElementById('palette');
            const loadingIndicator = document.getElementById('loading');
            paletteDiv.innerHTML = ''; // Clear previous palette
            loadingIndicator.style.display = 'block'; // Show loading state
            setTimeout(() => { // Simulate loading
                for (let i = 0; i < 5; i++) {
                    const color = `#${Math.floor(Math.random()*16777215).toString(16)}`;
                    const colorDiv = document.createElement('div');
                    colorDiv.className = 'color';
                    colorDiv.style.backgroundColor = color;
                    colorDiv.onclick = function() {
                        navigator.clipboard.writeText(color);
                        alert('Color ' + color + ' copied to clipboard!');
                    };
                    paletteDiv.appendChild(colorDiv);
                }
                loadingIndicator.style.display = 'none'; // Hide loading state
            }, 500);
        };
    </script>
    <a href="https://ai-site-factory-green.vercel.app" id="__back_btn" style="position:fixed;bottom:20px;right:20px;z-index:99999;background:rgba(10,10,15,0.9);backdrop-filter:blur(10px);color:#58a6ff;border:1px solid rgba(88,166,255,0.4);padding:10px 18px;border-radius:50px;font-family:sans-serif;font-size:14px;font-weight:600;text-decoration:none;box-shadow:0 4px 20px rgba(0,0,0,0.5);">← AI Site Factory</a>
</body>
</html>
