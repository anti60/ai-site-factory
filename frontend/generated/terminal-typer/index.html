<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Terminal Typer</title><style>body{background-color:black;color:white;display:flex;justify-content:center;align-items:center;height:100vh;font-family:'Inter', sans-serif;margin:0}.container{display:flex;flex-direction:column;align-items:center;}.game-area{border:1px solid #58a6ff;padding:20px;width:90%;max-width:500px;text-align:center;}.command{font-size:28px;font-weight:600;margin:20px 0;}.score{font-size:24px;}.btn{background:rgba(88,166,255,0.4);border:none;color:black;padding:10px 15px;border-radius:5px;margin-top:10px;cursor:pointer;transition: background 0.3s;}.btn:hover{background:rgba(88,166,255,0.6);}.btn:active{background:rgba(88,166,255,0.8);}.hidden{display:none;}@media (max-width: 600px) {.command{font-size:24px;}.score{font-size:20px;}.btn{width:100%;}}@media (min-width: 600px) and (max-width: 900px) {.game-area{width:80%;}}@media (min-width: 900px) {.game-area{width:60%;}}</style><link href='https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap' rel='stylesheet'></head><body><div class='container'><div class='game-area'><h1 style='font-size:32px;margin-bottom:15px;'>Terminal Typer</h1><div class='command' id='command'></div><input type='text' id='input' placeholder='Type commands here...' autofocus/><div class='score' id='score'>Score: 0</div><button class='btn hidden' id='restart'>Restart</button></div></div><script>let commands = ['ls', 'cd ..', 'mkdir new_folder', 'rm file.txt', 'echo Hello World!', 'cat file.txt'];let currentCommand;let score = 0;let timer;let isGameActive = false;const commandEl = document.getElementById('command');const inputEl = document.getElementById('input');const scoreEl = document.getElementById('score');const restartBtn = document.getElementById('restart');function startGame() {score = 0;isGameActive = true;inputEl.value = '';inputEl.classList.remove('hidden');restartBtn.classList.add('hidden');scoreEl.textContent = 'Score: ' + score;nextCommand();}function nextCommand() {if (!isGameActive) return;currentCommand = commands[Math.floor(Math.random() * commands.length)];commandEl.textContent = currentCommand;inputEl.focus();startTimer();}function startTimer() {clearTimeout(timer);timer = setTimeout(() => {endGame();}, 7000);}function endGame() {isGameActive = false;commandEl.textContent = 'Game Over!';inputEl.classList.add('hidden');restartBtn.classList.remove('hidden');}inputEl.addEventListener('input', () => {if (inputEl.value === currentCommand) {score++;scoreEl.textContent = 'Score: ' + score;inputEl.value = '';nextCommand();}});restartBtn.addEventListener('click', startGame);startGame();</script></body></html>
