<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Retro Terminal Interaction</title><style>body { background: black; color: #00ff00; font-family: 'Outfit', sans-serif; overflow: hidden; margin: 0; padding: 0; letter-spacing: 1px; } #terminal { white-space: pre; font-size: 16px; padding: 20px; height: 100vh; overflow-y: auto; border: 1px solid #00ff00; } #input { outline: none; color: #00ff00; background: black; border: none; font-family: 'Outfit', sans-serif; width: 100%; } #cursor { display: inline-block; width: 10px; height: 20px; background: #00ff00; animation: blink 1s step-end infinite; } @keyframes blink { 50% { background: transparent; } } .output { margin: 10px 0; } </style><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet"></head><body><div id="terminal"><div id="outputArea"></div><div class="output">$ <input id="input" type="text" autofocus /></div><span id="cursor"></span></div><script>const terminal = document.getElementById('terminal'); const outputArea = document.getElementById('outputArea'); const input = document.getElementById('input'); const cursor = document.getElementById('cursor'); let cursorVisible = true; input.addEventListener('keydown', (event) => { if (event.key === 'Enter') { const value = input.value; addOutput(value); input.value = ''; } }); function addOutput(value) { const output = document.createElement('div'); output.className = 'output'; output.textContent = '> ' + value; outputArea.appendChild(output); terminal.scrollTop = terminal.scrollHeight; addAnimation(value); } function addAnimation(value) { if (value.includes('art')) { const art = '\n     /\_/\  ' + '\n    ( o.o ) ' + '\n     > ^ <  '; addOutput(art); } else if (value.includes('sound')) { const audio = new Audio('https://www.soundjay.com/button/sounds/button-1.mp3'); audio.play(); addOutput('Playing sound...'); } else { addOutput('Command not recognized.'); } } setInterval(() => { cursorVisible = !cursorVisible; cursor.style.visibility = cursorVisible ? 'visible' : 'hidden'; }, 500); </script><a href="http://localhost:4000" id="__back_btn" style="position:fixed;bottom:20px;right:20px;z-index:99999;background:rgba(10,10,15,0.9);backdrop-filter:blur(10px);color:#58a6ff;border:1px solid rgba(88,166,255,0.4);padding:10px 18px;border-radius:50px;font-family:sans-serif;font-size:14px;font-weight:600;text-decoration:none;box-shadow:0 4px 20px rgba(0,0,0,0.5);">← AI Site Factory</a></body></html>
