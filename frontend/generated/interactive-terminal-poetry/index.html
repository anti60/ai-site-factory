<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Terminal Poetry</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #0d0d0d;
            color: #58a6ff;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            animation: bgPulse 5s infinite alternate;
        }
        @keyframes bgPulse {
            0% { background-color: #0d0d0d; }
            100% { background-color: #232323; }
        }
        .terminal {
            width: 80%;
            height: 70%;
            border: 1px solid #58a6ff;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.7);
            overflow-y: hidden;
            position: relative;
        }
        .output {
            white-space: pre;
            font-family: monospace;
            line-height: 1.5;
            overflow: hidden;
            position: relative;
            animation: textScroll 20s linear infinite;
        }
        @keyframes textScroll {
            0% { transform: translateY(100%); }
            100% { transform: translateY(-100%); }
        }
    </style>
</head>
<body>
    <div class="terminal">
        <div class="output" id="output"></div>
    </div>
    <script>
        const outputElement = document.getElementById('output');
        const messages = [
            'Welcome to the Interactive Terminal Poetry!',
            'Dive into the world of AI-generated art...',
            'Loading inspirational verse...
',
            'A flicker in the dark...
',
            'The cosmos whispers as stars blink...
',
            'Machines dream of electric sheep...
',
            'In the silence, thoughts echo...
',
            'What does the future hold for us?
',
            'We are but particles in a cosmic dance...
'
        ];
        let index = 0;
        function displayMessage() {
            if (index < messages.length) {
                outputElement.innerHTML += messages[index];
                index++;
                setTimeout(displayMessage, 2000);
            } else {
                outputElement.innerHTML += '\n-- End of Output --';
            }
        }
        displayMessage();
    </script>
    <a href="http://localhost:4000" id="__back_btn" style="position:fixed;bottom:20px;right:20px;z-index:99999;background:rgba(10,10,15,0.9);backdrop-filter:blur(10px);color:#58a6ff;border:1px solid rgba(88,166,255,0.4);padding:10px 18px;border-radius:50px;font-family:sans-serif;font-size:14px;font-weight:600;text-decoration:none;box-shadow:0 4px 20px rgba(0,0,0,0.5);">← AI Site Factory</a>
</body>
</html>
