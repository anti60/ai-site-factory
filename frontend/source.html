<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Source Code Viewer | AI Site Factory</title>
  <link rel="stylesheet" href="styles/globals.css">
  <style>
    .page-container { max-width: 1200px; margin: 3rem auto; padding: 0 1rem; }
    h1 { font-size: 2.2rem; color: #fff; font-weight: 900; margin-bottom: 0.5rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem;}
    p.desc { color: var(--muted); margin-bottom: 2rem; font-size: 1.1rem; }
    .code-container {
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 3rem 1.5rem 1.5rem 1.5rem;
      overflow-x: auto;
      font-family: var(--font-mono);
      font-size: 0.9rem;
      line-height: 1.5;
      color: #c9d1d9;
      position: relative;
    }
    .copy-btn {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.8rem;
      transition: opacity 0.2s;
    }
    .copy-btn:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <nav>
    <div class="logo">AI<span>SiteFactory</span></div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="gallery.html">Gallery</a>
      <a href="my-sites.html">My Sites</a>
      <a href="games.html">Games</a>
      <a href="tools.html">Tools</a>
      <a href="random.html">Random</a>
      <a href="dashboard.html">Admin</a>
    </div>
  </nav>

  <div class="page-container">
    <h1>
      <span>Source Code: <span id="siteName" style="color:var(--accent);">Loading...</span></span>
      <a id="liveLink" href="#" class="btn btn-p" target="_blank" style="font-size: 0.9rem; padding: 0.6rem 1.2rem;">Live Preview ↗</a>
    </h1>
    <p class="desc">Raw HTML, CSS, and Javascript output generated by the AI engine.</p>
    
    <div class="code-container">
      <button class="copy-btn" onclick="copyCode()">Copy Code</button>
      <pre><code id="codeBlock">Loading...</code></pre>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const site = urlParams.get('site');
    let rawCode = '';

    if (!site) {
      document.getElementById('siteName').innerText = 'Error: No site provided';
      document.getElementById('codeBlock').innerText = 'Please provide a ?site= parameter.';
    } else {
      document.getElementById('siteName').innerText = site;
      document.getElementById('liveLink').href = `/generated/${site}/index.html`;
      
      fetch(`/generated/${site}/index.html`)
        .then(res => {
          if (!res.ok) throw new Error('Source file not found (404)');
          return res.text();
        })
        .then(text => {
          rawCode = text;
          // Escape HTML
          const escaped = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
          document.getElementById('codeBlock').innerHTML = escaped;
        })
        .catch(err => {
          document.getElementById('codeBlock').innerText = 'Failed to load source code: ' + err.message;
        });
    }

    function copyCode() {
      if (!rawCode) return;
      navigator.clipboard.writeText(rawCode).then(() => {
        const btn = document.querySelector('.copy-btn');
        btn.innerText = 'Copied!';
        setTimeout(() => btn.innerText = 'Copy Code', 2000);
      });
    }
  </script>
</body>
</html>
